name: run-tests

on:
  push:
    paths:
      - "**.php"
      - ".github/workflows/run_tests.yml"
      - "phpunit.xml.dist"
      - "composer.json"
      - "composer.lock"
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 5
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest]
        php: [8.4, 8.3]
        laravel: [11.*, 12.*, 13.*]
        stability: [prefer-lowest, prefer-stable]
        include:
          - laravel: 11.*
            testbench: ^9.0
            carbon: ^2.63
          - laravel: 12.*
            testbench: 10.*
            carbon: ^3.0
          - laravel: 13.*
            testbench: ^11.0
            carbon: ^3

    name: P${{ matrix.php }} - L${{ matrix.laravel }} - ${{ matrix.stability }} - ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Turso Local Database
        run: docker compose up -d

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv, imagick, fileinfo
          coverage: none

      - name: Setup problem matchers
        run: |
          echo "::add-matcher::${{ runner.tool_cache }}/php.json"
          echo "::add-matcher::${{ runner.tool_cache }}/phpunit.json"

      - name: Install dependencies
        run: |
          composer require "laravel/framework:${{ matrix.laravel }}" "orchestra/testbench:${{ matrix.testbench }}" "nesbot/carbon:${{ matrix.carbon }}" --no-interaction --no-update
          composer update --${{ matrix.stability }} --prefer-dist --no-interaction

      - name: List Installed Dependencies
        run: composer show -D

      - name: Execute tests
        run: vendor/bin/pest --ci

  stress-remote:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # The `secrets` context is not available in step-level `if:` expressions,
    # so surface the credentials as env vars and gate the remote steps on those.
    env:
      STRESS_TURSO_URL: ${{ secrets.STRESS_TURSO_URL }}
      STRESS_TURSO_TOKEN: ${{ secrets.STRESS_TURSO_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv, imagick, fileinfo
          coverage: none

      - name: Install dependencies
        run: composer update --prefer-stable --prefer-dist --no-interaction

      - name: Run Stress suite against memory backend
        run: vendor/bin/pest tests/Stress

      - name: Write Turso credentials file
        if: ${{ env.STRESS_TURSO_URL != '' && env.STRESS_TURSO_TOKEN != '' }}
        run: |
          printf 'STRESS_TURSO_URL=%s\nSTRESS_TURSO_TOKEN=%s\n' \
            "${{ secrets.STRESS_TURSO_URL }}" \
            "${{ secrets.STRESS_TURSO_TOKEN }}" \
            > .stress-creds.env

      - name: Run Stress suite against remote Turso backend
        if: ${{ env.STRESS_TURSO_URL != '' && env.STRESS_TURSO_TOKEN != '' }}
        run: |
          set -a; source .stress-creds.env; set +a
          LIBSQL_TEST_BACKEND=remote vendor/bin/pest tests/Stress
